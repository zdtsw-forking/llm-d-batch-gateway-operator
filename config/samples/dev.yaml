apiVersion: batch.llm-d.ai/v1alpha1
kind: LLMBatchGateway
metadata:
  name: batch-gateway-dev
spec:
  secretRef:
    name: batch-gateway-secrets
  dbBackend: postgresql
  fileStorage:
    s3:
      region: us-east-1
      endpoint: http://minio.default.svc.cluster.local:9000
      accessKeyId: minioadmin
      usePathStyle: true
      autoCreateBucket: true
  apiServer:
    replicas: 1
    imagePullPolicy: IfNotPresent
  processor:
    replicas: 1
    imagePullPolicy: IfNotPresent
    # globalInferenceGateway is only used in sync dispatch mode
    globalInferenceGateway:
      url: http://vllm-sim.default.svc.cluster.local:8000
      requestTimeout: 5m
      maxRetries: 3
      initialBackoff: 1s
      maxBackoff: 60s
    dispatchMode: async
    asyncConfig:
      replicas: 1
      concurrency: 8
      drainTimeout: 2m
      inferenceGateway:
        url: http://epp.default.svc:8081
      redis:
        requestQueueName: request-sortedset
        resultQueueName: result-list
        requestPathURL: /v1/completions
        pollIntervalMs: 1000
        batchSize: 10
      # tls: # requires TLS secret 
      #   secretName: igw-tls-certs
      #   insecureSkipVerify: false
      #   caCertKey: ca.crt
      #   certKey: tls.crt
      #   keyKey: tls.key
      transformConfig:
        requestTransforms:
        - name: gcs-whisper
          type: gcs_uri_multipart
          parameters:
            providers: whisper
      # modelServerMonitor: # PodMonitor CRD not available in Kind, comment this block out
      #   enabled: true
      #   selector:
      #     llm-d.ai/role: decode
      #   port: modelserver
      #   path: /metrics
      #   interval: 15s
  gc:
    interval: 30m
    imagePullPolicy: IfNotPresent
