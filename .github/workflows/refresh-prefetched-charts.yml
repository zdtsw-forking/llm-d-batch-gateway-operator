name: Refresh prefetched-charts

on:
  push:
    branches:
      - main
    paths:
      - 'Makefile'        # a BATCH_GATEWAY_REF bump
  workflow_dispatch: {}

jobs:
  refresh:
    name: Refresh prefetched-charts
    if: ${{ github.repository_owner == 'red-hat-data-services' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Regenerate prefetched-charts from BATCH_GATEWAY_REF
        run: make sync-prefetched-charts

      - name: Read pinned ref
        id: ref
        run: echo "ref=$(awk '/^BATCH_GATEWAY_REF/ {print $3}' Makefile)" >> "$GITHUB_OUTPUT"

      # Opens (or updates) a PR only when prefetched-charts/ actually changed; no-op otherwise.
      - name: Open PR if the chart changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: prefetched-charts
          branch: chore/refresh-prefetched-charts
          delete-branch: true
          commit-message: "chore: refresh prefetched-charts for batch-gateway ${{ steps.ref.outputs.ref }}"
          title: "chore: refresh prefetched-charts for batch-gateway ${{ steps.ref.outputs.ref }}"
          body: |
            Automated refresh `prefetched-charts/` for `BATCH_GATEWAY_REF=${{ steps.ref.outputs.ref }}` (generated by `make sync-prefetched-charts`).
