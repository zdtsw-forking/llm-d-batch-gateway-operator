name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/**'
      - 'cmd/**'
      - 'api/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify generated code is up to date
        run: |
          make generate manifests
          git diff --exit-code -- api/ config/crd/

      - name: Build
        run: make build

      - name: Test
        run: make test
