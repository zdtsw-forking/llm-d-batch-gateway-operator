suite: processor configmap
templates:
  - templates/processor-configmap.yaml
tests:
  - it: should render a ConfigMap with default values (no gateway configured)
    asserts:
      - isKind:
          of: ConfigMap
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:'
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'model_gateways:'

  - it: should default tls_insecure_skip_verify to false when omitted from global_inference_gateway
    set:
      processor.config.globalInferenceGateway:
        url: "http://global-gw:8000"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
      processor.config.modelGateways: null
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:[\s\S]*tls_insecure_skip_verify: false'

  - it: should default tls_insecure_skip_verify to false when omitted from model gateway
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":[\s\S]*tls_insecure_skip_verify: false'

  - it: should render global_inference_gateway when set
    set:
      processor.config.globalInferenceGateway:
        url: "http://global-gw:8000"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
        tlsInsecureSkipVerify: false
      processor.config.modelGateways: null
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'url: "http://global-gw:8000"'
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'model_gateways:'

  - it: should render global_inference_gateway optional fields only when set
    set:
      processor.config.globalInferenceGateway:
        url: "http://global-gw:8000"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
        tlsInsecureSkipVerify: true
        apiKeyName: "global-key"
        tlsCaCertFile: "/certs/ca.pem"
        tlsClientCertFile: "/certs/client.pem"
        tlsClientKeyFile: "/certs/client-key.pem"
      processor.config.modelGateways: null
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'api_key_name: "global-key"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_insecure_skip_verify: true'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_ca_cert_file: "/certs/ca.pem"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_client_cert_file: "/certs/client.pem"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_client_key_file: "/certs/client-key.pem"'

  - it: should not render global_inference_gateway when not set
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:'

  - it: should render concurrency config with default values
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'concurrency:\n\s+global: 100\n\s+per_endpoint: 10\n\s+recovery: 5'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'aimd:\n\s+enabled: true\n\s+min: 5\n\s+backoff_factor: 0.5\n\s+additive_increase: 1'

  - it: should render custom concurrency values
    set:
      processor.config.concurrency:
        global: 200
        perEndpoint: 20
        recovery: 10
        aimd:
          enabled: false
          min: 3
          backoffFactor: 0.7
          additiveIncrease: 2
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'global: 200'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'per_endpoint: 20'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'recovery: 10'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'enabled: false'

  - it: should render per-model gateway entries
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://llama-gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
          tlsInsecureSkipVerify: false
        "mistral":
          url: "http://mistral-gw:8000"
          requestTimeout: "2m"
          maxRetries: 1
          initialBackoff: "500ms"
          maxBackoff: "30s"
          tlsInsecureSkipVerify: false
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'url: "http://llama-gw:8000"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"mistral":'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'url: "http://mistral-gw:8000"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'request_timeout: "2m"'

  - it: should not contain stale model entries when a model is removed
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
          tlsInsecureSkipVerify: false
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":'
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: '"mistral":'

  - it: should render explicit zero maxRetries as 0 in model_gateways
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 0
          initialBackoff: "1s"
          maxBackoff: "60s"
          tlsInsecureSkipVerify: false
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":\s*\n\s+url:.*\n\s+request_timeout:.*\n\s+max_retries: 0'

  - it: should render apiKeyName only when set
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
          tlsInsecureSkipVerify: false
          apiKeyName: "my-key"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'api_key_name: "my-key"'

  - it: should not render apiKeyName when empty
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "api_key_name:"

  - it: should render TLS fields only when set
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
          tlsInsecureSkipVerify: true
          tlsCaCertFile: "/certs/ca.pem"
          tlsClientCertFile: "/certs/client.pem"
          tlsClientKeyFile: "/certs/client-key.pem"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_insecure_skip_verify: true'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_ca_cert_file: "/certs/ca.pem"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_client_cert_file: "/certs/client.pem"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'tls_client_key_file: "/certs/client-key.pem"'

  - it: should not render TLS cert fields when empty
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "tls_ca_cert_file:"
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "tls_client_cert_file:"
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "tls_client_key_file:"

  - it: should render bucket fields with correct names
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'queue_time_bucket:\n\s+start: 0\.1\n\s+factor: 2\n\s+count: 10'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'process_time_bucket:\n\s+start: 0\.1\n\s+factor: 2\n\s+count: 15'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'e2e_latency_bucket:\n\s+start: 1\n\s+factor: 3\n\s+count: 12'

  - it: should render file_client retry config
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'retry:\n\s+max_retries: 3\n\s+initial_backoff: "1s"\n\s+max_backoff: "10s"'

  - it: should render per-model inferenceObjective when set
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gie-a-epp:8081"
          inferenceObjective: "batch-sheddable-a"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
        "mistral":
          url: "http://gie-b-epp:8081"
          inferenceObjective: "batch-sheddable-b"
          requestTimeout: "2m"
          maxRetries: 1
          initialBackoff: "500ms"
          maxBackoff: "30s"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":[\s\S]*inference_objective: "batch-sheddable-a"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"mistral":[\s\S]*inference_objective: "batch-sheddable-b"'

  - it: should not render per-model inferenceObjective when empty
    set:
      processor.config.modelGateways:
        "llama-3":
          url: "http://gw:8000"
          requestTimeout: "5m"
          maxRetries: 3
          initialBackoff: "1s"
          maxBackoff: "60s"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":'
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: '"llama-3":[\s\S]*inference_objective:'

  - it: should render inferenceObjective on global_inference_gateway when set
    set:
      processor.config.globalInferenceGateway:
        url: "http://global-gw:8000"
        inferenceObjective: "batch-sheddable-global"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
      processor.config.modelGateways: null
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:[\s\S]*inference_objective: "batch-sheddable-global"'

  - it: should not render inferenceObjective on global_inference_gateway when empty
    set:
      processor.config.globalInferenceGateway:
        url: "http://global-gw:8000"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
      processor.config.modelGateways: null
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:'
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'global_inference_gateway:[\s\S]*inference_objective:'

  - it: should not render send_fairness_header when false (default)
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: 'send_fairness_header:'

  - it: should render send_fairness_header when enabled
    set:
      processor.config.sendFairnessHeader: true
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'send_fairness_header: true'

  - it: should not render ConfigMap when processor is disabled
    set:
      processor.enabled: false
    asserts:
      - hasDocuments:
          count: 0
