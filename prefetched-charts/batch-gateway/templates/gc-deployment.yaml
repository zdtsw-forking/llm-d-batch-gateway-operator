{{- if .Values.gc.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batch-gateway.gc.fullname" . }}
  labels:
    {{- include "batch-gateway.gc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gc.replicaCount }}
  selector:
    matchLabels:
      {{- include "batch-gateway.gc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gc-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "batch-gateway.gc.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "batch-gateway.gc.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- if hasKey .Values.gc "podSecurityContext" }}
        {{- toYaml .Values.gc.podSecurityContext | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
        {{- end }}
      containers:
      - name: gc
        securityContext:
          {{- toYaml .Values.gc.securityContext | nindent 12 }}
        image: {{ include "batch-gateway.gc.image" . }}
        imagePullPolicy: {{ .Values.gc.image.pullPolicy }}
        args:
        - --config=/etc/batch-gc/config.yaml
        - --v={{ .Values.gc.logging.verbosity }}
        {{- $metricsAddr := .Values.gc.config.metricsAddr }}
        {{- if not (hasPrefix ":" $metricsAddr) }}
        {{- fail (printf "gc.config.metricsAddr must be in \":PORT\" format (e.g. \":9091\"), got %q" $metricsAddr) }}
        {{- end }}
        {{- $metricsPort := trimPrefix ":" $metricsAddr | int }}
        {{- if or (le $metricsPort 0) (gt $metricsPort 65535) }}
        {{- fail (printf "gc.config.metricsAddr port must be 1-65535, got %d" $metricsPort) }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ $metricsPort }}
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: metrics
          periodSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          periodSeconds: 30
        resources:
          {{- toYaml .Values.gc.resources | nindent 12 }}
        volumeMounts:
        - name: config
          mountPath: /etc/batch-gc
          readOnly: true
        {{- include "batch-gateway.filesStorage.volumeMount" . | nindent 8 }}
        {{- if .Values.global.secretName }}
        - name: secrets
          mountPath: /etc/.secrets
          readOnly: true
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "batch-gateway.gc.fullname" . }}-config
      {{- include "batch-gateway.filesStorage.volume" . | nindent 6 }}
      {{- if .Values.global.secretName }}
      - name: secrets
        projected:
          sources:
          - secret:
              name: {{ .Values.global.secretName }}
      {{- end }}
      {{- with .Values.gc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
